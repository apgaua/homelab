apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap
  # The Application resource itself typically lives in the argocd namespace
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/apgaua/homelab
    targetRevision: HEAD
    path: argocd
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    # This is where the deployed resources will go
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
