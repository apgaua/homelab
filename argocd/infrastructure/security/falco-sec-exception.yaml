apiVersion: kyverno.io/v2beta1
kind: PolicyException
metadata:
  name: falco-security-exceptions
  namespace: falco
spec:
  exceptions:
    - policyName: disallow-host-path
      ruleNames:
        - autogen-host-path
    - policyName: disallow-privileged-containers
      ruleNames:
        - autogen-privileged-containers
  match:
    any:
      - resources:
          namespaces:
            - falco
