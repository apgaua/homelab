apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 28.14.1
    chart: prometheus
    helm:
      values: |
        alertmanager:
          enabled: false
        pushgateway:
          enabled: false
        prometheus-node-exporter:
          enabled: true

        server:
          persistentVolume:
            enabled: true
            storageClass: "nfs-client"
            size: 10Gi
          
          service:
            type: NodePort
            nodePort: 32090

          retention: "15d"
  
  destination:
    server: https://kubernetes.default.svc
    namespace: observability 
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true