apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 10.5.15
    chart: grafana
    helm:
      values: |
        persistence:
          enabled: true
          storageClassName: "nfs-client"
          size: 5Gi
        service:
          type: NodePort
          nodePort: 32000
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
            - name: Loki
              type: loki
              url: http://loki.observability.svc.cluster.local:3100
              access: proxy
              isDefault: false
            - name: Prometheus
              type: prometheus
              url: http://prometheus-server.observability.svc.cluster.local:80
              access: proxy
              isDefault: true
  
  destination:
    server: https://kubernetes.default.svc
    namespace: observability 
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true