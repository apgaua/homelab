apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signoz
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.signoz.io
    targetRevision: 0.117.1
    chart: signoz
    helm:
      values: |
        global:
          storageClass: nfs-client
        
        clickhouse:
          persistence:
            storageClass: nfs-client
            size: 20Gi
        
        alertmanager:
          persistence:
            storageClass: nfs-client
            size: 2Gi

        frontend:
          ingress:
            enabled: false
          service:
            type: NodePort
            nodePort: 33010
  
  destination:
    server: https://kubernetes.default.svc
    namespace: signoz
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true